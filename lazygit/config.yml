gui:

  nerdFontsVersion: "3"
  showRandomTip: false

  spinner:
    # The frames of the spinner animation.
    frames:
      - '⠟'
      - '⠯'
      - '⠷'
      - '⠾'
      - '⠽'
      - '⠻'

    # The "speed" of the spinner in milliseconds.
    rate: 50

  theme:
    selectedLineBgColor:
      - cyan

os:
  editPreset: 'nvim'
